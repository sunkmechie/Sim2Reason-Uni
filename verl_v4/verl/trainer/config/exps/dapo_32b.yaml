# @package _global_

project_name: verl


adv_estimator: grpo

use_kl_in_reward: false
kl_coef: 0.0
use_kl_loss: false
kl_loss_coef: 0.0

clip_ratio_low: 0.2
clip_ratio_high: 0.28

max_prompt_length: ${multiply:1024,2}
max_response_length: ${multiply:1024,16}
enable_overlong_buffer: false
overlong_buffer_len: ${multiply:1024,4}
overlong_penalty_factor: 1.0

loss_agg_mode: token-mean

enable_filter_groups: true
filter_groups_metric: seq_reward
max_num_gen_batches: 10
train_prompt_bsz: 32
gen_prompt_bsz: ${multiply:${train_prompt_bsz},5}
n_resp_per_prompt: 16
train_prompt_mini_bsz: 32

base_model: Qwen/Qwen2.5-32B-Instruct

temperature: 1.0
top_p: 1.0
top_k: -1  # 0 for HF rollout, -1 for vLLM rollout
val_top_p: 0.7

# Performance Related Parameter

sp_size: 8
use_dynamic_bsz: true
actor_ppo_max_token_len: ${add:${max_prompt_length},${max_response_length}}
infer_ppo_max_token_len: ${add:${max_prompt_length},${max_response_length}}
offload: true
gen_tp: 8
fsdp_size: -1

micro_batch_size: null
rollout_micro_batch_size: null



data:
  prompt_key: prompt
  truncation: left
  max_prompt_length: ${max_prompt_length}
  max_response_length: ${max_response_length}
  train_batch_size: ${train_prompt_bsz}
  gen_batch_size: ${gen_prompt_bsz}

actor_rollout_ref:
  nccl_timeout: 1800
  rollout:
    n: ${n_resp_per_prompt}
    log_prob_use_dynamic_bsz: ${use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${infer_ppo_max_token_len}
    log_prob_micro_batch_size_per_gpu: ${rollout_micro_batch_size}
    gpu_memory_utilization: 0.80
    tensor_model_parallel_size: ${gen_tp}
    enable_chunked_prefill: true
    max_num_batched_tokens: ${add:${max_prompt_length},${max_response_length}}
    temperature: ${temperature}
    top_p: ${top_p}
    top_k: ${top_k}
    name: vllm
    val_kwargs:
      temperature: ${temperature}
      top_p: ${val_top_p}
      top_k: ${top_k}
      do_sample: true
      n: 1
  actor:
    use_kl_loss: ${use_kl_loss}
    kl_loss_coef: ${kl_loss_coef}
    clip_ratio_low: ${clip_ratio_low}
    clip_ratio_high: ${clip_ratio_high}
    clip_ratio_c: 10.0
    use_dynamic_bsz: ${use_dynamic_bsz}
    ppo_micro_batch_size_per_gpu: ${micro_batch_size}
    ppo_max_token_len_per_gpu: ${actor_ppo_max_token_len}
    optim:
      lr: 1e-6
      lr_warmup_steps: 10
      weight_decay: 0.1
    ppo_mini_batch_size: ${train_prompt_mini_bsz}
    fsdp_config:
      param_offload: ${offload}
      optimizer_offload: ${offload}
      fsdp_size: ${fsdp_size}
    entropy_coeff: 0
    grad_clip: 1.0
    loss_agg_mode: ${loss_agg_mode}
    ulysses_sequence_parallel_size: ${sp_size}
  ref:
    log_prob_use_dynamic_bsz: ${use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${infer_ppo_max_token_len}
    fsdp_config:
      param_offload: ${offload}
    ulysses_sequence_parallel_size: ${sp_size}
  model:
    path: ${base_model}
    use_remove_padding: true
    enable_gradient_checkpointing: true

algorithm:
  adv_estimator: ${adv_estimator}
  use_kl_in_reward: ${use_kl_in_reward}
  kl_ctrl:
    kl_coef: ${kl_coef}
  filter_groups:
    enable: ${enable_filter_groups}
    max_num_gen_batches: ${max_num_gen_batches}
    metric: ${filter_groups_metric}

reward_model:
  reward_manager: dapo
  overlong_buffer:
    enable: ${enable_overlong_buffer}
    len: ${overlong_buffer_len}
    penalty_factor: ${overlong_penalty_factor}

trainer:
  project_name: ${project_name}
  n_gpus_per_node: 8
  nnodes: 1
  val_before_train: true
  test_freq: 5
  save_freq: 5
  total_epochs: 5
  ray_wait_register_center_timeout: 1800
  resume_mode: auto

