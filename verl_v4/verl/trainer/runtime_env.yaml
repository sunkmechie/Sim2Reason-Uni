working_dir: ./
excludes:
  - "**/.git/**"
  - "*.pptx"
  - "*.zip"
  - "*.tar"
  - "**/__pycache__/**"
  - "*.mp4"
  - "*.npy"
  - "*.log"
  - "*.ckpt"
  - "**/DSLs/**"
  - "*.xml"
  - "*.gif"
  - "*.err"
  - "*.out"
  - "**/sbatch_logs/"
  - "**/wandb/"
  - "*.json"
  - "!**/cost.json"  # llm/utils/cost.json has to be included, otherwise runtime error will be raised
  - "*.csv"
env_vars:
  TORCH_NCCL_AVOID_RECORD_STREAMS: "1"
  CUDA_DEVICE_MAX_CONNECTIONS: "1"
  # If you are using vllm<=0.6.3, you might need to set the following environment variable to avoid bugs:
  # VLLM_ATTENTION_BACKEND: "XFORMERS"
  GLOO_SOCKET_IFNAME: "bond0" # this is for gh200 cluster
